<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: full bleed background, content within central 80% circle -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full bleed background (required for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Shield (safe zone: centered ~205px radius) -->
  <path d="M256 96 L360 156 L360 256 Q360 340 256 385 Q152 340 152 256 L152 156 Z"
        fill="rgba(0,242,255,0.07)"
        stroke="#00f2ff" stroke-width="4" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Big S -->
  <text x="256" y="298"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="195" font-weight="900"
        fill="#00f2ff"
        text-anchor="middle"
        filter="url(#glow2)">S</text>

  <!-- DGIIT -->
  <text x="256" y="435"
        font-family="Arial, sans-serif"
        font-size="36" font-weight="700"
        fill="#00f2ff"
        text-anchor="middle"
        letter-spacing="7"
        opacity="0.8">DGIIT</text>
</svg>
