version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: glass_task_db
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3310:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-sgc_pro}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: glass_task_backend
    restart: always
    ports:
      - "4001:${PORT:-3000}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: glass_task_frontend
    restart: always
    ports:
      - "3030:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
